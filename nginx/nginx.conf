# nginx/nginx.conf
# Template file — DOMAIN env var is substituted via envsubst before nginx starts.
# Requirement 19.1: HTTPS enforcement, security headers, reverse proxy routing.

# ─────────────────────────────────────────────
# Main app server — HTTPS on port 8443
# (Viettel residential ISP blocks ports 80/443;
#  router forwards external :8443 → internal :8443)
# ─────────────────────────────────────────────
server {
    listen 8443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers — Requirement 19.1
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # WebSocket proxy — must come before /api and /
    # Handles STOMP/SockJS connections from frontend
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Backend API proxy
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        client_max_body_size 512m;
    }

    # Frontend proxy — catch-all
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────
# HTTP on port 8080 — ACME challenge only
# (no redirect since port 80 is blocked by ISP)
# ─────────────────────────────────────────────
server {
    listen 8080;
    server_name ${DOMAIN};

    # Allow ACME challenge through (Let's Encrypt verification)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# ─────────────────────────────────────────────
# Jitsi virtual host — HTTPS on port 8443
# ─────────────────────────────────────────────
server {
    listen 8443 ssl http2;
    server_name meet.${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/meet.${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meet.${DOMAIN}/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers — Requirement 19.1
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass https://jitsi:8443;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Jitsi uses a self-signed cert internally; skip verification
        proxy_ssl_verify off;
    }
}

# ─────────────────────────────────────────────
# HTTP on port 8080 — redirect meet subdomain
# ─────────────────────────────────────────────
server {
    listen 8080;
    server_name meet.${DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}
