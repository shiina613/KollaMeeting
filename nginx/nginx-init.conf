# nginx/nginx-init.conf
# Fallback HTTP-only config used when SSL certificates are not yet available.
# Listens on port 8080 (Viettel blocks 80/443 on residential plans).

events {
    worker_connections 1024;
}

http {
    server {
        listen 8080;
        server_name _;

        # Serve ACME challenge files (DNS challenge doesn't need this,
        # but kept for compatibility)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Status page while SSL is being obtained
        location / {
            return 200 'Kolla Meeting - SSL certificate being obtained, please wait...';
            add_header Content-Type text/plain;
        }
    }
}
