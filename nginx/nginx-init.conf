# nginx/nginx-init.conf
# Minimal HTTP-only config used during initial certbot ACME challenge.
# Nginx starts with this config so certbot can complete domain validation
# before any SSL certificates exist.

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        # Serve ACME challenge files for Let's Encrypt domain validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # All other requests return a plain-text status message
        location / {
            return 200 'nginx init mode - awaiting SSL certificate';
            add_header Content-Type text/plain;
        }
    }
}
