# Testcontainers integration test profile
# MySQL and Redis containers are started by @Testcontainers annotation
# DataSource URL is overridden dynamically via @DynamicPropertySource

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# Flyway enabled — runs real migration scripts
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=testcontainers-secret-key-for-tc-tests-32chars
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# CORS
CORS_ALLOWED_ORIGINS=http://localhost:3000

# Transcription queue
transcription.queue.sorted-set-key=tc-transcription-queue
transcription.queue.job-hash-prefix=tc-transcription-job-
transcription.queue.high-priority-meeting-key=tc-meeting-high-priority
transcription.waiting-timeout-s=600

# File storage
file.storage.base-path=./target/tc-test-storage

# Gipformer
gipformer.service-url=http://localhost:8000
gipformer.callback-api-key=tc-test-callback-key
