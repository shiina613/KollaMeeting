# Test properties for RoleBasedAccessControlTest
# Overrides application.yml to avoid YAML parsing issues with colon-containing values
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
jwt.secret=test-secret-key-for-unit-tests-only-32chars
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000
CORS_ALLOWED_ORIGINS=http://localhost:3000
transcription.queue.sorted-set-key=transcription-queue
transcription.queue.job-hash-prefix=transcription-job-
transcription.queue.high-priority-meeting-key=meeting-high-priority
transcription.waiting-timeout-s=600
file.storage.base-path=./target/test-storage
gipformer.service-url=http://localhost:8000
