# Test properties for @ActiveProfiles("test") integration tests
# Uses H2 in-memory database to avoid requiring a real MySQL connection

# ── Datasource (H2 in-memory) ─────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE,USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# create-drop: schema is created from JPA entities at startup and dropped at shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=
spring.jpa.show-sql=false

# ── Flyway (disabled — schema managed by Hibernate in tests) ──────────────────
spring.flyway.enabled=false

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=test-secret-key-for-unit-tests-only-32chars
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

# ── CORS ──────────────────────────────────────────────────────────────────────
CORS_ALLOWED_ORIGINS=http://localhost:3000

# ── Transcription queue ───────────────────────────────────────────────────────
transcription.queue.sorted-set-key=transcription-queue
transcription.queue.job-hash-prefix=transcription-job-
transcription.queue.high-priority-meeting-key=meeting-high-priority
transcription.waiting-timeout-s=600

# ── File storage ──────────────────────────────────────────────────────────────
file.storage.base-path=./target/test-storage

# ── Gipformer ─────────────────────────────────────────────────────────────────
gipformer.service-url=http://localhost:8000
