# Test properties for WebSocket integration tests
spring.datasource.url=jdbc:h2:mem:wstest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.data.redis.host=localhost
spring.data.redis.port=6379
jwt.secret=test-secret-key-for-websocket-tests-only-32chars
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000
CORS_ALLOWED_ORIGINS=http://localhost:3000
transcription.queue.sorted-set-key=transcription-queue-ws-test
transcription.queue.job-hash-prefix=transcription-job-ws-
transcription.queue.high-priority-meeting-key=meeting-high-priority-ws-test
transcription.waiting-timeout-s=600
file.storage.base-path=./target/test-storage-ws
gipformer.service-url=http://localhost:8000
