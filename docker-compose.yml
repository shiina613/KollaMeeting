# Kolla Meeting Rebuild - Docker Compose
# Services: frontend (:3000), backend (:8080), gipformer (:8000),
#           mysql (:3306), redis (:6379), cloudflared (tunnel)

networks:
  kolla-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  app-storage:
    driver: local

services:
  # ─────────────────────────────────────────────
  # MySQL 8.0
  # ─────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: kolla-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-kollaroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-kolla_meeting}
      MYSQL_USER: ${MYSQL_USER:-kolla}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-kollapass}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - kolla-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-kollaroot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kolla-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - kolla-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────
  # Backend – Spring Boot 3.2 (:8080)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kolla-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Requirement 14.1 – DB connection
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-kolla_meeting}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-kolla}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-kollapass}
      # Requirement 14.2 – JWT
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key-at-least-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}
      # Requirement 14.3 – File storage path
      FILE_STORAGE_PATH: /app/storage
      # Requirement 14.4 – Jitsi server URL
      JITSI_SERVER_URL: ${JITSI_SERVER_URL:-https://meet.jit.si}
      # Requirement 14.5 – Gipformer service URL
      GIPFORMER_SERVICE_URL: http://gipformer:8000
      # CORS configuration
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      # Redis configuration
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:-redis}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:-}
      # Jitsi configuration
      JITSI_APP_ID: ${JITSI_APP_ID:-kolla}
      JITSI_APP_SECRET: ${JITSI_APP_SECRET:-}
      # Gipformer callback API key
      GIPFORMER_CALLBACK_API_KEY: ${GIPFORMER_CALLBACK_API_KEY:-}
      # Timezone
      TZ: Asia/Ho_Chi_Minh
      JAVA_OPTS: "-Duser.timezone=Asia/Ho_Chi_Minh"
    volumes:
      - app-storage:/app/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kolla-network

  # ─────────────────────────────────────────────
  # Gipformer – Python FastAPI + sherpa-onnx (:8000)
  # GPU passthrough via nvidia runtime; set DEVICE=cpu to fall back to CPU ONNX
  # ─────────────────────────────────────────────
  gipformer:
    build:
      context: ./gipformer
      dockerfile: Dockerfile
    container_name: kolla-gipformer
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # DEVICE=cuda enables GPU inference; set to "cpu" for CPU-only ONNX fallback
      DEVICE: ${DEVICE:-cuda}
      REDIS_URL: redis://redis:6379
      BACKEND_CALLBACK_URL: http://backend:8080/api/v1/transcription/callback
      STORAGE_PATH: /app/storage
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - app-storage:/app/storage
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kolla-network
    # GPU passthrough – requires nvidia-container-toolkit on the host.
    # If no GPU is available, set DEVICE=cpu in your .env file; sherpa-onnx
    # will automatically use CPU ONNX inference without this deploy section.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ─────────────────────────────────────────────
  # Frontend – React 18 + Vite (:3000)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_JITSI_URL: ${VITE_JITSI_URL:-https://meet.jit.si}
        # VITE_API_BASE_URL and VITE_WS_URL are injected via .env by startup scripts
        # (scripts/start.ps1 or scripts/start.sh) — do not hardcode here
    container_name: kolla-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Requirement 14.6 – API base URL
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
      # Requirement 14.7 – Jitsi server URL
      VITE_JITSI_URL: ${VITE_JITSI_URL:-https://meet.jit.si}
      TZ: Asia/Ho_Chi_Minh
    depends_on:
      - backend
    networks:
      - kolla-network

  # ─────────────────────────────────────────────
  # Nginx – reverse proxy + SSL termination
  # Requirement 19.1: HTTPS, security headers, routing
  #   /        → frontend:3000
  #   /api     → backend:8080
  #   /ws      → backend:8080 (WebSocket upgrade)
  # Port 8888: HTTP plain for Cloudflare Tunnel (tunnel terminates SSL)
  # Port 8443: HTTPS self-signed for LAN access (backward compat)
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: kolla-nginx
    restart: unless-stopped
    ports:
      - "8081:8080"   # HTTP (ACME challenge + redirect) — port 8080 used by Docker Desktop
      - "8443:8443"   # HTTPS (main app) — LAN backward compat
      - "8888:8888"   # HTTP plain — for Cloudflare Tunnel / LAN testing
    environment:
      DOMAIN: ${DOMAIN:-kolla.local}
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN:-}
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-admin@example.com}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      # nginx.conf template — envsubst expands ${DOMAIN} at container start
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - frontend
      - backend
    networks:
      - kolla-network

  # ─────────────────────────────────────────────
  # Cloudflare Tunnel (cloudflared) — Quick Tunnel mode
  # Exposes Nginx port 8888 to the internet via Cloudflare edge.
  # No account, domain, or port forwarding required.
  # URL is auto-generated on each start (see scripts/start.ps1 / start.sh).
  #
  # Named Tunnel upgrade path (when you have a domain):
  #   1. Add to .env: CLOUDFLARE_TUNNEL_TOKEN=eyJ...
  #   2. Uncomment the environment block below and change command to:
  #      command: tunnel --no-autoupdate run
  # ─────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: kolla-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://nginx:8888
    # Named Tunnel upgrade path — uncomment when CLOUDFLARE_TUNNEL_TOKEN is set:
    # environment:
    #   TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - nginx
    networks:
      - kolla-network